<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      text-align: center;
      padding: 48px 32px;
      max-width: 360px;
      width: 100%;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 48px;
    }

    .counter {
      font-size: 6rem;
      font-weight: 200;
      line-height: 1;
      color: #111;
      margin-bottom: 48px;
      font-variant-numeric: tabular-nums;
      transition: transform 0.1s ease;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid #ddd;
      background: #fff;
      color: #333;
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .btn:hover {
      border-color: #111;
      color: #111;
    }

    .btn:active {
      transform: scale(0.92);
    }

    .btn-reset {
      width: auto;
      border-radius: 24px;
      padding: 0 20px;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .status {
      font-size: 0.75rem;
      color: #bbb;
      letter-spacing: 0.05em;
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vendi</h1>
    <div class="counter" id="count">0</div>
    <div class="controls">
      <button class="btn" onclick="update(-1)" aria-label="Decrement">&minus;</button>
      <button class="btn btn-reset" onclick="reset()" aria-label="Reset">Reset</button>
      <button class="btn" onclick="update(1)" aria-label="Increment">+</button>
    </div>
    <div class="status"><span class="dot"></span>Sandbox running</div>
  </div>

  <script>
    const el = document.getElementById('count');
    function update(n) {
      el.textContent = parseInt(el.textContent) + n;
      el.style.transform = 'scale(1.05)';
      setTimeout(() => el.style.transform = '', 100);
    }
    function reset() { el.textContent = '0'; }
  </script>
</body>
</html>
