<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendi Test App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #e4ecf4;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 48px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #6366f1;
      margin-bottom: 8px;
    }
    .o-text-gradient {
      background: linear-gradient(90deg, #446dcd, #4bb6d3, #6ef2cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #94a3b8;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .badge {
      display: inline-block;
      background: #312e81;
      color: #a5b4fc;
      padding: 6px 16px;
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .counter {
      margin-top: 32px;
      font-size: 3rem;
      font-weight: 800;
      color: #818cf8;
    }
    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 3.5rem;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-weight: 500;
      font-size: 1rem;
      text-align: center;
      cursor: pointer;
      background-color: #171717;
      color: #ffffff;
      /* Inset glow */
      box-shadow: inset 0 0 10px 0 rgba(255, 255, 255, 0.2);
      /* Ring (outline + offset simulation) */
      outline: 1px solid rgba(255, 255, 255, 0.2);
      outline-offset: 2px;
      /* Offset background simulation */
      border: 2px solid #171717;
      transition: all 0.2s ease;
    }
    .button:hover {
      /* Stronger glow */
      box-shadow: inset 0 0 20px 0 rgba(255, 255, 255, 0.4);
      /* Brighter ring */
      outline: 1px solid rgba(255, 255, 255, 0.4);
    }
    .button:active {
      transform: scale(0.98);
    }
    .dark .button {
      background-color: #ffffff;
      color: #000000;
      /* Dark glow */
      box-shadow: inset 0 0 10px 0 rgba(0, 0, 0, 0.2);
      /* Dark ring */
      outline: 1px solid rgba(0, 0, 0, 0.2);
      /* Offset color */
      border: 2px solid #ffffff;
    }
    .dark .button:hover {
      box-shadow: inset 0 0 20px 0 rgba(0, 0, 0, 0.3);
      outline: 1px solid rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">✚</div>
    <h1 class="o-text-gradient">Vendi Test App</h1>
    <p>This app is being modified live by Vendi's AI agent. Ask it to change colors, text, or add new elements.</p>
    <span class="badge">✚ Sandbox running</span>
    <div class="counter" id="count">0</div>
    <button class="button" onclick="document.getElementById('count').textContent = (parseInt(document.getElementById('count').textContent) || 0) + 4">
      Increment
    </button>
    <button class="button" style="margin-top: 16px;" onclick="document.getElementById('count').textContent = (parseInt(document.getElementById('count').textContent) || 0) - 2">
      Decrement
    </button>
    <button class="button" style="margin-top: 16px;" onclick="document.getElementById('count').textContent = 0">
      Reset
    </button>
  </div>
</body>
</html>
